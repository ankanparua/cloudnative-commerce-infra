name: "Platform Self-Service Pipeline"

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-provision:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      # 📦 Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # 🔐 DEBUG (remove later if you want)
      - name: Debug TFC Token
        run: |
          if [ -z "${{ secrets.TFC_API_TOKEN }}" ]; then
            echo "❌ TOKEN NOT FOUND"
            exit 1
          else
            echo "✅ TOKEN FOUND"
          fi

      # 🔑 Configure Terraform Cloud Token (CRITICAL STEP)
      - name: Configure Terraform Cloud Token
        run: |
          mkdir -p $HOME/.terraform.d
          echo "{\"credentials\":{\"app.terraform.io\":{\"token\":\"${{ secrets.TFC_API_TOKEN }}\"}}}" > $HOME/.terraform.d/credentials.tfrc.json

      # 👀 Verify credentials file (debug)
      - name: Show credentials file
        run: |
          cat $HOME/.terraform.d/credentials.tfrc.json

      # ☁️ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 🚀 Terraform Init
      - name: Terraform Init
        run: terraform init -input=false

      # 📊 Terraform Plan (PR only)
      - name: Terraform Plan (PR)
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -detailed-exitcode

      # 🚀 Terraform Apply (on push to main)
      - name: Terraform Apply (Merge)
        if: github.event_name == 'push'
        run: terraform apply -input=false -auto-approve
